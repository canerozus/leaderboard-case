# infrastructure/edge/nginx.http.conf
# HTTP-only config — used during initial deploy and ACME challenges.
# Replaced at runtime by nginx.https.conf when LEADERBOARD_TLS=1.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  server_tokens off;
  gzip on;
  gzip_types application/javascript application/json text/css text/plain image/svg+xml;
  gzip_min_length 1024;
  client_max_body_size 64k;

  upstream backend {
    server backend:3000 max_fails=3 fail_timeout=10s;
    keepalive 16;
  }

  server {
    listen 80 default_server;
    server_name _;

    # ACME http-01 challenge — certbot drops files here.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    # API
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_read_timeout 30s;
      proxy_pass http://backend;
    }

    # Long-cache hashed Vite assets (must precede the SPA fallback)
    location /assets/ {
      root /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # SPA — serve index.html for any unmatched path so client-side routing works
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache" always;
    }
  }
}
