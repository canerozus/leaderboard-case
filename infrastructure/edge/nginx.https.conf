# infrastructure/edge/nginx.https.conf
# Used at runtime when LEADERBOARD_TLS=1. The string LEADERBOARD_DOMAIN is replaced
# by the entrypoint shim with the real domain from the env.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  server_tokens off;
  gzip on;
  gzip_types application/javascript application/json text/css text/plain image/svg+xml;
  gzip_min_length 1024;
  client_max_body_size 64k;

  upstream backend {
    server backend:3000 max_fails=3 fail_timeout=10s;
    keepalive 16;
  }

  # ── HTTP: ACME + redirect to HTTPS ──────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ───────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/LEADERBOARD_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/LEADERBOARD_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_read_timeout 30s;
      proxy_pass http://backend;
    }

    location /assets/ {
      root /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache" always;
    }
  }
}
