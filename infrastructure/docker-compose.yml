# infrastructure/docker-compose.yml
# Local dev only. Production compose lives in infrastructure/docker-compose.prod.yml (Plan 3).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leaderboard
      POSTGRES_USER: leaderboard
      POSTGRES_PASSWORD: leaderboard
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaderboard"]
      interval: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongodata:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1})"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    command: ["npm", "run", "dev:api"]
    environment:
      NODE_ENV: development
      PORT: "3000"
      LOG_LEVEL: info
      POSTGRES_URL: postgres://leaderboard:leaderboard@postgres:5432/leaderboard
      MONGO_URL: mongodb://mongo:27017/leaderboard
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-locally-at-least-32-characters-long
      JWT_EXPIRES_IN: 7d
      BCRYPT_COST: "10"
      TAP_RATE_LIMIT_TTL_SEC: "1"
    ports: ["3000:3000"]
    volumes:
      - ../backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    command: ["npm", "run", "dev:worker"]
    environment:
      NODE_ENV: development
      LOG_LEVEL: info
      POSTGRES_URL: postgres://leaderboard:leaderboard@postgres:5432/leaderboard
      MONGO_URL: mongodb://mongo:27017/leaderboard
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-locally-at-least-32-characters-long
      JWT_EXPIRES_IN: 7d
      BCRYPT_COST: "10"
      TAP_RATE_LIMIT_TTL_SEC: "1"
    volumes:
      - ../backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }

volumes:
  pgdata:
  mongodata:
  redisdata:
  backend_node_modules:
